# topology: level08 (配線のみ。L3は solution.conf/problem.conf)
# containerlab topology format: https://containerlab.dev/manual/topo-def-file/
name: level08
mgmt:
  network: npclab
  ipv4-subnet: 172.30.30.0/24
topology:
  nodes:
    inet:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      sysctls:
        net.ipv4.ip_forward: "1"
        net.ipv4.conf.all.rp_filter: "0"
        net.ipv4.conf.default.rp_filter: "0"
      exec: [ip link set eth1 up]
    r1:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      sysctls:
        net.ipv4.ip_forward: "1"
        net.ipv4.conf.all.rp_filter: "0"
        net.ipv4.conf.default.rp_filter: "0"
      exec:
        - ip link set eth1 up
        - ip link set eth2 up
    r2:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      sysctls:
        net.ipv4.ip_forward: "1"
        net.ipv4.conf.all.rp_filter: "0"
        net.ipv4.conf.default.rp_filter: "0"
      exec:
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set eth3 up
    c:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      exec: [ip link set eth1 up]
    d:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      exec: [ip link set eth1 up]
  links:
    - endpoints: ["inet:eth1", "r1:eth1"]
    - endpoints: ["r1:eth2", "r2:eth1"]
    - endpoints: ["r2:eth2", "c:eth1"]
    - endpoints: ["r2:eth3", "d:eth1"]
