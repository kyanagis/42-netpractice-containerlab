# topology: bgp (配線/アドレスは既与。eBGPのneighbor/networkを solution/problem で埋める)
# FRR: https://docs.frrouting.org/  bgpd は daemons(bind) で起動時に有効化
name: bgp
mgmt:
  network: npclab
  ipv4-subnet: 172.30.30.0/24
topology:
  nodes:
    r1: &frr
      kind: linux
      image: quay.io/frrouting/frr:10.2.1
      binds:
        - daemons:/etc/frr/daemons
      sysctls: { net.ipv4.ip_forward: "1", net.ipv4.conf.all.rp_filter: "0", net.ipv4.conf.default.rp_filter: "0" }
      exec:
        - ip link set eth1 up
        - ip link set eth2 up
    r2: *frr
    ha: { kind: linux, image: ghcr.io/srl-labs/network-multitool, exec: ["ip link set eth1 up"] }
    hc: { kind: linux, image: ghcr.io/srl-labs/network-multitool, exec: ["ip link set eth1 up"] }
  links:
    - endpoints: ["ha:eth1", "r1:eth1"]
    - endpoints: ["r1:eth2", "r2:eth1"]
    - endpoints: ["r2:eth2", "hc:eth1"]
