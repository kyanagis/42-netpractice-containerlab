# bgp 穴埋め。___ を埋めて ./lab.sh apply d8-bgp
# 与件(アドレスは既与。eBGPの相手AS番号と、自分が広告するLANを埋める):
#   r1 = AS65001, LAN A=10.1.0.0/24 / r2 = AS65002, LAN C=10.2.0.0/24
#   ピアリンク 10.0.12.0/30 (r1=.1, r2=.2)。 'no bgp ebgp-requires-policy' は既与(FRRの既定回避)。
ha: ip addr add 10.1.0.10/24 dev eth1
ha: ip route replace default via 10.1.0.1
hc: ip addr add 10.2.0.10/24 dev eth1
hc: ip route replace default via 10.2.0.1
r1: ip addr add 10.1.0.1/24 dev eth1
r1: ip addr add 10.0.12.1/30 dev eth2
r2: ip addr add 10.0.12.2/30 dev eth1
r2: ip addr add 10.2.0.1/24 dev eth2
r1: vtysh -c 'conf t' -c 'router bgp 65001' -c 'no bgp ebgp-requires-policy' -c 'neighbor 10.0.12.2 remote-as ___' -c 'network ___'
r2: vtysh -c 'conf t' -c 'router bgp 65002' -c 'no bgp ebgp-requires-policy' -c 'neighbor 10.0.12.1 remote-as ___' -c 'network ___'
