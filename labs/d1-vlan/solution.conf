# vlan 模範解答: アクセスポート=PVID untagged / トランク(eth3)=両VLANをタグ付き
sw1: bridge vlan add dev eth1 vid 10 pvid untagged
sw1: bridge vlan add dev eth2 vid 20 pvid untagged
sw1: bridge vlan add dev eth3 vid 10
sw1: bridge vlan add dev eth3 vid 20
sw2: bridge vlan add dev eth1 vid 10 pvid untagged
sw2: bridge vlan add dev eth2 vid 20 pvid untagged
sw2: bridge vlan add dev eth3 vid 10
sw2: bridge vlan add dev eth3 vid 20
h1: ip addr add 10.0.0.1/24 dev eth1
h2: ip addr add 10.0.0.2/24 dev eth1
h3: ip addr add 10.0.0.3/24 dev eth1
h4: ip addr add 10.0.0.4/24 dev eth1
