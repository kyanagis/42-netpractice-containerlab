# vlan 穴埋め。___ を埋めて ./lab.sh apply d1-vlan
# 与件: h1,h3=VLAN10 / h2,h4=VLAN20。全員 10.0.0.0/24(あえて同一subnet)。
#       sw1—sw2 間(eth3)はトランク。アクセスポートは untagged、トランクは tagged。
sw1: bridge vlan add dev eth1 vid ___ pvid untagged
sw1: bridge vlan add dev eth2 vid ___ pvid untagged
sw1: bridge vlan add dev eth3 vid ___
sw1: bridge vlan add dev eth3 vid ___
sw2: bridge vlan add dev eth1 vid ___ pvid untagged
sw2: bridge vlan add dev eth2 vid ___ pvid untagged
sw2: bridge vlan add dev eth3 vid ___
sw2: bridge vlan add dev eth3 vid ___
h1: ip addr add 10.0.0.1/24 dev eth1
h2: ip addr add 10.0.0.2/24 dev eth1
h3: ip addr add 10.0.0.3/24 dev eth1
h4: ip addr add 10.0.0.4/24 dev eth1
