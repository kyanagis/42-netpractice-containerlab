# topology: dhcpdns (配線/srvアドレスは既与。dnsmasq(DHCP+DNS)とclientのudhcpcを埋める)
# dnsmasq: https://thekelleys.org.uk/dnsmasq/doc.html
name: dhcpdns
mgmt:
  network: npclab
  ipv4-subnet: 172.30.30.0/24
topology:
  nodes:
    lsw: { kind: linux, image: ghcr.io/srl-labs/network-multitool, exec: [
      "ip link add br0 type bridge", "ip link set br0 up",
      "ip link set eth1 master br0", "ip link set eth2 master br0", "ip link set eth3 master br0",
      "ip link set eth1 up", "ip link set eth2 up", "ip link set eth3 up" ] }
    srv:    { kind: linux, image: ghcr.io/srl-labs/network-multitool, exec: ["ip link set eth1 up"] }
    app:    { kind: linux, image: ghcr.io/srl-labs/network-multitool, exec: ["ip link set eth1 up"] }
    client: { kind: linux, image: ghcr.io/srl-labs/network-multitool, exec: ["ip link set eth1 up"] }
  links:
    - endpoints: ["lsw:eth1", "srv:eth1"]
    - endpoints: ["lsw:eth2", "app:eth1"]
    - endpoints: ["lsw:eth3", "client:eth1"]
