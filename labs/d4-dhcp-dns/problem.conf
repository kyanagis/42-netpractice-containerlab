# dhcpdns 穴埋め。___ を埋めて ./lab.sh apply d4-dhcp-dns
# 与件: LAN=10.0.0.0/24。srv=.1(DHCP+DNSサーバ), app=.20(名前 app.lab で引かせたい)。
#       client は静的IP無し → DHCPでアドレス/ゲートウェイを取得し、DNS(srv)で app.lab を解決して到達する。
#       ※Dockerが/etc/resolv.confを127.0.0.11に固定するため、本ラボではDHCPで得たDNS(10.0.0.1)を明示的に書く。
srv: ip addr add 10.0.0.1/24 dev eth1
app: ip addr add 10.0.0.20/24 dev eth1
# (1) dnsmasq: 配布レンジ / DNSオプション(6) / app.lab の名前解決
srv: pkill dnsmasq 2>/dev/null; dnsmasq --interface=eth1 --bind-interfaces --no-resolv --dhcp-authoritative --dhcp-range=___,___,12h --dhcp-option=3,10.0.0.1 --dhcp-option=6,___ --address=/app.lab/___ --dhcp-leasefile=/tmp/leases --log-facility=/tmp/dnsmasq.log
# (2) client: DHCPクライアントでアドレス取得(取得後に終了)
client: udhcpc -i eth1 ___ -t 5 -T 1
# (3) client: 使うDNSサーバ(DHCPで得た値)を指定
client: echo "nameserver ___" > /etc/resolv.conf
