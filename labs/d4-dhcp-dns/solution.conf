# dhcpdns 模範解答: srvでdnsmasq(DHCP配布+名前解決), clientはudhcpcで取得しDNSを使う
srv: ip addr add 10.0.0.1/24 dev eth1
app: ip addr add 10.0.0.20/24 dev eth1
srv: pkill dnsmasq 2>/dev/null; dnsmasq --interface=eth1 --bind-interfaces --no-resolv --dhcp-authoritative --dhcp-range=10.0.0.100,10.0.0.150,12h --dhcp-option=3,10.0.0.1 --dhcp-option=6,10.0.0.1 --address=/app.lab/10.0.0.20 --dhcp-leasefile=/tmp/leases --log-facility=/tmp/dnsmasq.log
client: udhcpc -i eth1 -q -n -t 5 -T 1
client: echo "nameserver 10.0.0.1" > /etc/resolv.conf
