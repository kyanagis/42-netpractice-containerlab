# topology: level09 (構成とアドレスはREADME.md)
# containerlab topology format: https://containerlab.dev/manual/topo-def-file/
name: level09
mgmt:
  network: npclab
  ipv4-subnet: 172.30.30.0/24
topology:
  nodes:
    inet:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      sysctls:
        net.ipv4.ip_forward: "1"
        net.ipv4.conf.all.rp_filter: "0"
        net.ipv4.conf.default.rp_filter: "0"
      exec:
        - ip addr add 163.172.250.1/28 dev eth1
        - ip link set eth1 up
        - ip route add 11.0.0.0/25 via 163.172.250.12
        - ip route add 12.0.0.0/25 via 163.172.250.12
    r1:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      sysctls:
        net.ipv4.ip_forward: "1"
        net.ipv4.conf.all.rp_filter: "0"
        net.ipv4.conf.default.rp_filter: "0"
      exec:
        - ip addr add 11.0.0.1/25 dev eth1
        - ip addr add 163.172.250.12/28 dev eth2
        - ip addr add 22.0.0.2/30 dev eth3
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set eth3 up
        - ip route add 12.0.0.0/25 via 22.0.0.1
        - ip route add 95.253.0.0/18 via 22.0.0.1
        - ip route replace default via 163.172.250.1
    r2:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      sysctls:
        net.ipv4.ip_forward: "1"
        net.ipv4.conf.all.rp_filter: "0"
        net.ipv4.conf.default.rp_filter: "0"
      exec:
        - ip addr add 22.0.0.1/30 dev eth1
        - ip addr add 12.0.0.1/25 dev eth2
        - ip addr add 95.253.35.22/18 dev eth3
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set eth3 up
        - ip route replace default via 22.0.0.2
    sw:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      exec:
        - ip link add br0 type bridge
        - ip link set br0 up
        - ip link set eth1 master br0
        - ip link set eth2 master br0
        - ip link set eth3 master br0
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set eth3 up
    a:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      exec:
        - ip addr add 11.0.0.2/25 dev eth1
        - ip link set eth1 up
        - ip route replace default via 11.0.0.1
    b:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      exec:
        - ip addr add 11.0.0.3/25 dev eth1
        - ip link set eth1 up
        - ip route replace default via 11.0.0.1
    c:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      exec:
        - ip addr add 12.0.0.2/25 dev eth1
        - ip link set eth1 up
        - ip route replace default via 12.0.0.1
    d:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      exec:
        - ip addr add 95.253.35.1/18 dev eth1
        - ip link set eth1 up
        - ip route replace default via 95.253.35.22
  links:
    - endpoints: ["inet:eth1", "r1:eth2"]
    - endpoints: ["r1:eth1", "sw:eth1"]
    - endpoints: ["sw:eth2", "a:eth1"]
    - endpoints: ["sw:eth3", "b:eth1"]
    - endpoints: ["r1:eth3", "r2:eth1"]
    - endpoints: ["r2:eth2", "c:eth1"]
    - endpoints: ["r2:eth3", "d:eth1"]
