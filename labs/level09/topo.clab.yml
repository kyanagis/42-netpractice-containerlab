# topology: level09 (配線のみ。swはL2ブリッジ(既与)。L3は solution.conf/problem.conf)
# containerlab topology format: https://containerlab.dev/manual/topo-def-file/
name: level09
mgmt:
  network: npclab
  ipv4-subnet: 172.30.30.0/24
topology:
  nodes:
    inet:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      sysctls:
        net.ipv4.ip_forward: "1"
        net.ipv4.conf.all.rp_filter: "0"
        net.ipv4.conf.default.rp_filter: "0"
      exec: [ip link set eth1 up]
    r1:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      sysctls:
        net.ipv4.ip_forward: "1"
        net.ipv4.conf.all.rp_filter: "0"
        net.ipv4.conf.default.rp_filter: "0"
      exec:
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set eth3 up
    r2:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      sysctls:
        net.ipv4.ip_forward: "1"
        net.ipv4.conf.all.rp_filter: "0"
        net.ipv4.conf.default.rp_filter: "0"
      exec:
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set eth3 up
    sw:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      exec:
        - ip link add br0 type bridge
        - ip link set br0 up
        - ip link set eth1 master br0
        - ip link set eth2 master br0
        - ip link set eth3 master br0
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set eth3 up
    a:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      exec: [ip link set eth1 up]
    b:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      exec: [ip link set eth1 up]
    c:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      exec: [ip link set eth1 up]
    d:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      exec: [ip link set eth1 up]
  links:
    - endpoints: ["inet:eth1", "r1:eth2"]
    - endpoints: ["r1:eth1", "sw:eth1"]
    - endpoints: ["sw:eth2", "a:eth1"]
    - endpoints: ["sw:eth3", "b:eth1"]
    - endpoints: ["r1:eth3", "r2:eth1"]
    - endpoints: ["r2:eth2", "c:eth1"]
    - endpoints: ["r2:eth3", "d:eth1"]
