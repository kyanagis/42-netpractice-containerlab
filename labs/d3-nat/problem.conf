# nat 穴埋め。___ を埋めて ./lab.sh apply d3-nat (アドレスは既与)
# 与件: LAN=10.0.0.0/24 (cli=.10, web=.20, gw=.1) / WAN=198.51.100.0/24 (gw=.1, ext=.9)
#       ext は LAN への経路を持たない。web は :80 で待受(既定nginx)。
cli: ip addr add 10.0.0.10/24 dev eth1
cli: ip route replace default via 10.0.0.1
web: ip addr add 10.0.0.20/24 dev eth1
web: ip route replace default via 10.0.0.1
gw: ip addr add 10.0.0.1/24 dev eth1
gw: ip addr add 198.51.100.1/24 dev eth2
ext: ip addr add 198.51.100.9/24 dev eth1
# (1) LAN→WAN を送信元NAT(gwのWAN IPに化ける)
gw: iptables -t nat -A POSTROUTING -s 10.0.0.0/24 -o eth2 -j ___
# (2) WAN:8080 を web:80 へ転送(ポートフォワード)
gw: iptables -t nat -A PREROUTING -i eth2 -p tcp --dport 8080 -j DNAT --to-destination ___
# (3) ステートフルFW: 戻り(ESTABLISHED)許可 / cliのみ外向き許可 / web:80への転送許可 / 既定は遮断
gw: iptables -A FORWARD -m state --state ESTABLISHED,RELATED -j ACCEPT
gw: iptables -A FORWARD -i eth1 -s 10.0.0.10 -o eth2 -j ACCEPT
gw: iptables -A FORWARD -i eth2 -d 10.0.0.20 -p tcp --dport 80 -j ACCEPT
gw: iptables -P FORWARD ___
