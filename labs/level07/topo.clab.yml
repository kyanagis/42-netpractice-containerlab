# topology: level07 (構成とアドレスはREADME.md)
# containerlab topology format: https://containerlab.dev/manual/topo-def-file/
name: level07
mgmt:
  network: npclab
  ipv4-subnet: 172.30.30.0/24
topology:
  nodes:
    a:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      exec:
        - ip addr add 111.198.14.2/30 dev eth1
        - ip link set eth1 up
        - ip route replace default via 111.198.14.1
    r1:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      sysctls:
        net.ipv4.ip_forward: "1"
        net.ipv4.conf.all.rp_filter: "0"
        net.ipv4.conf.default.rp_filter: "0"
      exec:
        - ip addr add 111.198.14.1/30 dev eth1
        - ip addr add 111.198.14.254/30 dev eth2
        - ip link set eth1 up
        - ip link set eth2 up
        - ip route add 111.198.14.248/30 via 111.198.14.253
    r2:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      sysctls:
        net.ipv4.ip_forward: "1"
        net.ipv4.conf.all.rp_filter: "0"
        net.ipv4.conf.default.rp_filter: "0"
      exec:
        - ip addr add 111.198.14.253/30 dev eth1
        - ip addr add 111.198.14.249/30 dev eth2
        - ip link set eth1 up
        - ip link set eth2 up
        - ip route add 111.198.14.0/30 via 111.198.14.254
    c:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      exec:
        - ip addr add 111.198.14.250/30 dev eth1
        - ip link set eth1 up
        - ip route replace default via 111.198.14.249
  links:
    - endpoints: ["a:eth1", "r1:eth1"]
    - endpoints: ["r1:eth2", "r2:eth1"]
    - endpoints: ["r2:eth2", "c:eth1"]
