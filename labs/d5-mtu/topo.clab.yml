# topology: mtu (配線/アドレスは既与。ボトルネックリンクのMTUを埋める)
# Path MTU Discovery: RFC 1191
name: mtu
mgmt:
  network: npclab
  ipv4-subnet: 172.30.30.0/24
topology:
  nodes:
    r:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      sysctls: { net.ipv4.ip_forward: "1", net.ipv4.conf.all.rp_filter: "0", net.ipv4.conf.default.rp_filter: "0" }
      exec: ["ip link set eth1 up", "ip link set eth2 up", "ip link set eth1 mtu 1500"]
    h1: { kind: linux, image: ghcr.io/srl-labs/network-multitool, exec: ["ip link set eth1 up", "ip link set eth1 mtu 1500"] }
    h2: { kind: linux, image: ghcr.io/srl-labs/network-multitool, exec: ["ip link set eth1 up"] }
  links:
    - endpoints: ["h1:eth1", "r:eth1"]
    - endpoints: ["r:eth2", "h2:eth1"]
