# mtu 模範解答: r—h2 リンクを MTU 1400 に。アドレス/経路は既与扱いで設定。
h1: ip addr add 10.0.0.10/24 dev eth1
h1: ip route replace default via 10.0.0.1
r:  ip addr add 10.0.0.1/24 dev eth1
r:  ip addr add 10.0.1.1/24 dev eth2
h2: ip addr add 10.0.1.10/24 dev eth1
h2: ip route replace default via 10.0.1.1
r:  ip link set eth2 mtu 1400
h2: ip link set eth1 mtu 1400
