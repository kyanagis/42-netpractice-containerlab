# topology: subnet (配線のみ。L3は solution.conf/problem.conf)
# containerlab topology format: https://containerlab.dev/manual/topo-def-file/
name: subnet
mgmt:
  network: npclab
  ipv4-subnet: 172.30.30.0/24
topology:
  nodes:
    pc1:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      exec:
        - ip link set eth1 up
    pc2:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      exec:
        - ip link set eth1 up
  links:
    - endpoints: ["pc1:eth1", "pc2:eth1"]
