# ipv6 模範解答: 2つの/64をルータで中継 (nodadでDAD待ちを省略)
h1: ip -6 addr add 2001:db8:1::10/64 dev eth1 nodad
h1: ip -6 route replace default via 2001:db8:1::1
r:  ip -6 addr add 2001:db8:1::1/64 dev eth1 nodad
r:  ip -6 addr add 2001:db8:2::1/64 dev eth2 nodad
h2: ip -6 addr add 2001:db8:2::10/64 dev eth1 nodad
h2: ip -6 route replace default via 2001:db8:2::1
