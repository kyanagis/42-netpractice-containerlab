# ospf 穴埋め。___ を埋めて ./lab.sh apply d7-ospf
# 与件(アドレス/タイマは設定済み。OSPFで「自分が接続している各サブネット」を area 0 で広告):
#   A=10.1.0.0/24(r1) / r1-r2=10.0.12.0/30 / r2-r3=10.0.23.0/30 / C=10.3.0.0/24(r3)
#   静的経路は書かない。各ルータが広告し合い、経路は自動で学習される。
ha: ip addr add 10.1.0.10/24 dev eth1
ha: ip route replace default via 10.1.0.1
hc: ip addr add 10.3.0.10/24 dev eth1
hc: ip route replace default via 10.3.0.1
r1: ip addr add 10.1.0.1/24 dev eth1
r1: ip addr add 10.0.12.1/30 dev eth2
r2: ip addr add 10.0.12.2/30 dev eth1
r2: ip addr add 10.0.23.1/30 dev eth2
r3: ip addr add 10.0.23.2/30 dev eth1
r3: ip addr add 10.3.0.1/24 dev eth2
r1: vtysh -c 'conf t' -c 'interface eth2' -c 'ip ospf network point-to-point' -c 'ip ospf hello-interval 1' -c 'ip ospf dead-interval 4'
r2: vtysh -c 'conf t' -c 'interface eth1' -c 'ip ospf network point-to-point' -c 'ip ospf hello-interval 1' -c 'ip ospf dead-interval 4'
r2: vtysh -c 'conf t' -c 'interface eth2' -c 'ip ospf network point-to-point' -c 'ip ospf hello-interval 1' -c 'ip ospf dead-interval 4'
r3: vtysh -c 'conf t' -c 'interface eth1' -c 'ip ospf network point-to-point' -c 'ip ospf hello-interval 1' -c 'ip ospf dead-interval 4'
r1: vtysh -c 'conf t' -c 'router ospf' -c 'network ___ area 0' -c 'network ___ area 0'
r2: vtysh -c 'conf t' -c 'router ospf' -c 'network ___ area 0' -c 'network ___ area 0'
r3: vtysh -c 'conf t' -c 'router ospf' -c 'network ___ area 0' -c 'network ___ area 0'
