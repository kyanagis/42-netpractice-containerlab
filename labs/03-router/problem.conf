# router 穴埋め。___ を埋めて ./lab.sh apply 03-router
# 与件: 2サブネット 10.0.1.0/24(h1側) と 10.0.2.0/24(h2側) をルータ r が中継。
#       h1=10.0.1.10/24, h2=10.0.2.10/24 は確定。
r:  ip addr add ___ dev eth1
r:  ip addr add ___ dev eth2
h1: ip addr add 10.0.1.10/24 dev eth1
h1: ip route replace default via ___
h2: ip addr add 10.0.2.10/24 dev eth1
h2: ip route replace default via ___
