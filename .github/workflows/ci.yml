# CI: shellcheck + topology parse + 実deploy/ping/destroy検証
# containerlab: https://containerlab.dev/  (CI install: https://containerlab.dev/install/)
name: ci

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - run: shellcheck --severity=error lab.sh labs/_verify_lib.sh labs/*/verify.sh

  labs:
    runs-on: ubuntu-latest
    env:
      LAB_RUNTIME: linux
    steps:
      - uses: actions/checkout@v4
      - name: Install containerlab
        run: bash -c "$(curl -sL https://get.containerlab.dev)" -- -v 0.75.0
      - name: Validate topologies (offline parse)
        run: |
          for t in labs/*/topo.clab.yml; do
            echo "::group::$t"
            sudo containerlab graph --offline --topo "$t" >/dev/null
            echo "::endgroup::"
          done
      - name: Deploy / ping / destroy all labs
        run: bash lab.sh test-all
