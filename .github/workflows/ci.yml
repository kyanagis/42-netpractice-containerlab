# CI: shellcheck + topology parse + 実deploy/ping/destroy検証 + 校舎用imageをghcrにpush
# containerlab: https://containerlab.dev/  (CI install: https://containerlab.dev/install/)
name: ci

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - run: shellcheck --severity=error lab.sh bin/containerlab bin/np-clab-env.sh labs/_verify_lib.sh labs/*/verify.sh

  labs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      LAB_RUNTIME: linux
    steps:
      - uses: actions/checkout@v4
      - name: Install containerlab
        run: bash -c "$(curl -sL https://get.containerlab.dev)" -- -v 0.75.0
      # --mermaid を付けて parse のみ実行(付けないと graph はHTTPサーバ起動でブロックする)
      - name: Validate topologies (parse, non-blocking)
        run: |
          for t in labs/*/topo.clab.yml; do
            echo "::group::$t"
            sudo containerlab graph --offline --mermaid --topo "$t" >/dev/null
            echo "::endgroup::"
          done
      - name: Deploy / ping / destroy all labs
        run: bash lab.sh test-all

  # テスト通過後に校舎用ラボ環境イメージを ghcr.io へ push (mainのみ)
  image:
    needs: [shellcheck, labs]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/kyanagis/42-netpractice-containerlab:latest
